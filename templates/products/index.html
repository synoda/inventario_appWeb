{% extends "base.html" %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2>Listado de Productos</h2>
    <a href="{{ url_for('producto_form') }}" class="btn btn-primary">Nuevo Producto</a>
</div>

<div class="card shadow">
    <div class="card-body">
        <table class="table table-striped">
            <thead>
                <tr>
                    <th>Código</th>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                {% for p in productos %}
                <tr>
                    <td>{{ p.codigo }}</td>
                    <td>{{ p.nombre }}</td>
                    <td>{{ p.categoria.nombre }}</td>
                    <td>${{ p.precio }}</td>
                    <td class="{{ 'text-danger fw-bold' if p.stock <= p.stock_minimo else '' }}">
                        {{ p.stock }}
                    </td>
                    <td>
                        <a href="{{ url_for('producto_form', id=p.id) }}" class="btn btn-sm btn-warning">Editar</a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
